name: My First Workflow with id ${{ github.run_id }}
run-name: Workflow run by ${{ github.actor }} & Workflow number is ${{ github.run_number}}
on: 
  push: 
    branches:
      - main
      - devlop
jobs: 
  My_First_Job:
    name: My First Job
    runs-on: ubuntu-latest
    steps:
      - name: My First step
        run: |
          echo "My First Job Run Successful"
          echo "My application name is ${{ vars.app_name }} run in ${{ vars.environment }} & run By ${{ vars.team }}"
