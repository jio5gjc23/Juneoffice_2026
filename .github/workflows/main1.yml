name: My First Workflow
run-name: Workflow run by ${{ github.actor }} & Workflow number is ${{ github.run_number}}
env:
  app_name: myapp
on: 
  push: 
    branches:
      - main
      - devlop
jobs: 
  My_First_Job:
  env:
    environment: dev
    name: My First Job
    runs-on: ubuntu-latest
    steps:
      - name: My First step
        env: 
          team: devops
        run: |
          echo "My First Job Run Successful"
          echo "My application name is $app_name run in $environment & run By $team"
